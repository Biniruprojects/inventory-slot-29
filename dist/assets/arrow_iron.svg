<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- Iron Arrow — grey arrow pointing up -->
  <!-- Arrowhead -->
  <rect x="7" y="1" width="2" height="1" fill="#6a6a7a"/>
  <rect x="6" y="2" width="4" height="1" fill="#6a6a7a"/>
  <rect x="5" y="3" width="6" height="1" fill="#505060"/>
  <!-- Shaft -->
  <rect x="7" y="4" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="5" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="6" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="7" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="8" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="9" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="10" width="2" height="1" fill="#8b4513"/>
  <rect x="7" y="11" width="2" height="1" fill="#8b4513"/>
  <!-- Fletching -->
  <rect x="6" y="12" width="1" height="2" fill="#cc4444"/>
  <rect x="9" y="12" width="1" height="2" fill="#cc4444"/>
  <rect x="7" y="12" width="2" height="2" fill="#8b4513"/>
</svg>